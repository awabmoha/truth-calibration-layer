  <text x="54" y="343" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Gemma SQuAD</text>
  <rect x="214" y="326" width="543" height="14" rx="7" fill="#334155"/>
  <rect x="214" y="346" width="88" height="14" rx="7" fill="#0f766e"/>
  <text x="768" y="338" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">62</text>
  <text x="313" y="358" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#0f766e">10</text>

  <text x="54" y="393" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Gemma TriviaQA</text>
  <rect x="214" y="376" width="665" height="14" rx="7" fill="#334155"/>
  <rect x="214" y="396" width="88" height="14" rx="7" fill="#0f766e"/>
  <text x="890" y="388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">76</text>
  <text x="313" y="408" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#0f766e">10</text>

  <rect x="54" y="452" width="872" height="1" fill="#e5e7eb"/>
  <text x="54" y="468" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">
    Aggregate: raw = 224, conservative TCL-v0 = 44, reduction = 180 fewer high-confidence wrong cases.
  </text>
