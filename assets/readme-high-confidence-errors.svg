<svg xmlns="http://www.w3.org/2000/svg" width="980" height="500" viewBox="0 0 980 500" role="img" aria-labelledby="title desc">
  <title id="title">High-confidence wrong answers before and after conservative TCL-v0</title>
  <desc id="desc">Bar chart comparing raw confidence against conservative TCL-v0 wrong answers at confidence greater than or equal to 0.8 across six reviewed runs.</desc>
  <rect width="980" height="500" fill="#f8fafc"/>
  <rect x="24" y="24" width="932" height="452" rx="14" fill="#ffffff" stroke="#d7dde8"/>

  <text x="54" y="64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">
    High-Confidence Wrong Answers
  </text>
  <text x="54" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#4b5563">
    Reviewed 1,000-example QA runs; threshold: confidence &gt;= 0.8
  </text>

  <rect x="676" y="48" width="18" height="18" rx="4" fill="#334155"/>
  <text x="704" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">Raw confidence</text>
  <rect x="824" y="48" width="18" height="18" rx="4" fill="#0f766e"/>
  <text x="852" y="62" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#374151">Conservative TCL-v0</text>

  <line x1="214" y1="120" x2="214" y2="420" stroke="#e5e7eb"/>
  <line x1="389" y1="120" x2="389" y2="420" stroke="#eef2f7"/>
  <line x1="564" y1="120" x2="564" y2="420" stroke="#eef2f7"/>
  <line x1="739" y1="120" x2="739" y2="420" stroke="#eef2f7"/>
  <line x1="914" y1="120" x2="914" y2="420" stroke="#eef2f7"/>

  <text x="208" y="444" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">0</text>
  <text x="389" y="444" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">20</text>
  <text x="564" y="444" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">40</text>
  <text x="739" y="444" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">60</text>
  <text x="914" y="444" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#64748b">80</text>

  <text x="54" y="143" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Qwen SQuAD</text>
  <rect x="214" y="126" width="263" height="14" rx="7" fill="#334155"/>
  <rect x="214" y="146" width="88" height="14" rx="7" fill="#0f766e"/>
  <text x="488" y="138" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">30</text>
  <text x="313" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#0f766e">10</text>

  <text x="54" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Qwen TriviaQA</text>
  <rect x="214" y="176" width="79" height="14" rx="7" fill="#334155"/>
  <rect x="214" y="196" width="9" height="14" rx="5" fill="#0f766e"/>
