  <text x="234" y="208" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#0f766e">1</text>

  <text x="54" y="243" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Phi SQuAD</text>
  <rect x="214" y="226" width="44" height="14" rx="7" fill="#334155"/>
  <rect x="214" y="246" width="35" height="14" rx="7" fill="#0f766e"/>
  <text x="269" y="238" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#334155">5</text>
