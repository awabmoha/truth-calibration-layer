  <text x="54" y="293" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#111827">Phi TriviaQA</text>
  <rect x="214" y="276" width="368" height="14" rx="7" fill="#334155"/>
